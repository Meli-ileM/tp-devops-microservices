name: Microservices CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # Build de chaque microservice

    - name: Build Catalogue Service
      run: |
        cd catalogue-service
        mvn clean install

    - name: Build Commande Service
      run: |
        cd commande-service
        mvn clean install

    - name: Build Paiement Service
      run: |
        cd paiement-service
        mvn clean install

    - name: Build Gateway Service
      run: |
        cd gateway-service
        mvn clean install

    # (optionnel) si tu veux builder aussi config et discovery :
    - name: Build Config Service
      run: |
        cd config-service
        mvn clean install
    
    - name: Build Discovery Service
      run: |
        cd discovery-service
        mvn clean install
 
 
    # Étape Docker (exemple sur un microservice)
    - name: Enable Docker
      run: |
        sudo systemctl start docker || true
        docker version

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image catalogue-service
      run: |
        cd catalogue-service
        docker build -t catalogue-service:ci .
    - name: Run tests in Docker (catalogue-service)
      run: |
        cd catalogue-service
        docker build -f Dockerfile.test -t catalogue-service-tests .
